<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>requisitos de..| juegos stars(Iconos Fix)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --star-white: #ffffff;
            --nebula-purple: #8a2be2;
            --accent-orange: #ff7f50;
            --deep-space: #05000a;
            --glass: rgba(15, 0, 30, 0.95);
            --success-green: #00ff88;
            --fps-blue: #00d4ff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1a0033 0%, #05000a 100%);
            background-attachment: fixed;
            color: var(--star-white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid rgba(255,127,80,0.3);
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            text-shadow: 0 0 20px var(--nebula-purple);
            letter-spacing: 5px;
            margin: 0;
            cursor: pointer;
        }

        /* --- FORMULARIO --- */
        .contact-section {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 50px;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.2);
        }

        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .input-group label { font-size: 0.75rem; font-family: 'Orbitron'; color: var(--accent-orange); text-transform: uppercase; }
        
        input, textarea {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 6px;
            color: white;
            font-family: 'Inter';
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus { border-color: var(--nebula-purple); box-shadow: 0 0 10px rgba(138, 43, 226, 0.5); }

        .btn-send {
            background: var(--nebula-purple);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Orbitron';
            text-transform: uppercase;
            width: 100%;
            transition: 0.3s;
        }

        .btn-send:hover { background: #9d4edd; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(138, 43, 226, 0.4); }

        /* --- BUSCADOR Y LISTA --- */
        .search-bar {
            width: 100%;
            padding: 15px;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 1.1rem;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            padding: 10px;
        }

        .game-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
            font-weight: 600;
        }

        .game-card:hover { border-color: var(--nebula-purple); background: rgba(138, 43, 226, 0.2); transform: scale(1.02); }

        /* --- DETALLES Y FPS (FIX CON ICONOS) --- */
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }

        .tier-card {
            background: var(--glass);
            border-radius: 15px;
            padding: 25px;
            border-top: 4px solid var(--accent-orange);
            margin-bottom: 20px;
        }
        .tier-card.promedio { border-top-color: #00d4ff; }
        .tier-card.extremo { border-top-color: var(--success-green); }

        .fps-badge {
            background: var(--fps-blue);
            color: black;
            font-family: 'Orbitron';
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: block;
            text-align: center;
            margin-bottom: 20px;
        }

        .component-row {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* ESTILO DE ICONOS FIX */
        .comp-visual {
            font-size: 2rem;
            color: var(--star-white);
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 0 5px var(--nebula-purple));
        }

        .comp-info { flex: 1; }
        .comp-label { display: block; font-size: 0.7rem; color: #aaa; text-transform: uppercase; }
        .comp-name { font-size: 0.95rem; font-weight: 600; color: #fff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 onclick="showList()">CORE_DIAGNOSTIC</h1>
    </header>

    <section class="contact-section">
        <h3 style="font-family:'Orbitron'; font-size: 0.9rem; color: var(--accent-orange); margin-bottom: 20px; text-align: center;">REPORTE AL NÚCLEO</h3>
        <form action="https://formspree.io/f/xeerpvor" method="POST">
            <div class="contact-grid">
                <div class="input-group">
                    <label>Tu Correo</label>
                    <input type="email" name="email" placeholder="rangergamer459@gmail.com" required>
                </div>
                <div class="input-group">
                    <label>Juego faltante / Asunto</label>
                    <input type="text" name="juego" placeholder="Ej: Nueva Guía de Batman" required>
                </div>
            </div>
            <div class="input-group">
                <label>Mensaje / Sugerencia</label>
                <textarea name="mensaje" rows="3" placeholder="Detalles de la build aquí..." required style="width: 100%; box-sizing: border-box;"></textarea>
            </div>
            <button type="submit" class="btn-send">ENVIAR TRANSMISIÓN DE DATOS</button>
        </form>
    </section>

    <div id="list-view" class="view active">
        <input type="text" id="search" class="search-bar" placeholder="🔍 Buscar entre 100 juegos (Actuales y Clásicos)..." onkeyup="filterGames()">
        <div class="game-grid" id="game-container"></div>
    </div>

    <div id="detail-view" class="view">
        <button class="btn-send" style="background:none; border: 1px solid white; width: auto; margin-bottom: 20px;" onclick="showList()">← VOLVER AL ÍNDICE</button>
        <h2 id="det-game-title" style="font-family: 'Orbitron'; text-align: center; margin-bottom: 30px; color: var(--accent-orange);"></h2>
        <div id="tier-wrapper" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px;"></div>
    </div>
</div>

<script>
    // ICONOS VECTORIALES DE FONT AWESOME (Remplazan las imágenes rotas)
    const icons = {
        cpu: '<i class="fa-solid fa-microchip"></i>',
        gpu: '<i class="fa-solid fa-gamepad"></i>', // Icono de gráfica/gamepad táctico
        ram: '<i class="fa-solid fa-memory"></i>',
        disk: '<i class="fa-solid fa-hard-drive"></i>'
    };

    const gameNames = [
        // JUEGOS ACTUALES
        "Arena Breakout Infinite", "Gray Zone Warfare", "Warzone 3.0", "CS2", "Valorant", "Cyberpunk 2077", "Elden Ring", "Starfield", "Helldivers 2", "Bodycam", "Delta Force", "Forza Horizon 5", "Halo Infinite", "Apex Legends", "Ready or Not", "Squad", "Sons of the Forest", "Palworld", "Enshrouded", "The First Descendant",
        // JUEGOS CLÁSICOS (2010-2020)
        "Batman: Arkham Knight", "GTA V", "Red Dead Redemption 2", "The Witcher 3", "Minecraft RTX", "Rust", "Escape from Tarkov", "Rainbow Six Siege", "Overwatch", "Destiny 2", "DayZ", "Battlefield V", "Battlefield 1", "Battlefield 4", "Star Wars Battlefront II", "Assassin's Creed Odyssey", "Control", "Metro Exodus", "Doom Eternal", "Resident Evil 7", "Sekiro: Shadows Die Twice", "Fallout 4", "Skyrim Special Edition", "Dark Souls III", "The Division 2", "Borderlands 3", "Monster Hunter World", "Final Fantasy XV", "Devil May Cry 5", "Far Cry 5", "Far Cry 4", "Watch Dogs 2", "Just Cause 3", "Mad Max", "Shadow of the Tomb Raider", "Titanfall 2", "Call of Duty: WWII", "Dishonored 2", "BioShock Infinite", "Crysis 3", "Left 4 Dead 2"
    ];

    // GENERADOR DE DATOS CON TUS COMPONENTES
    const gamesData = gameNames.map(name => ({
        name: name.toUpperCase(),
        min: { cpu: "i3-4160 / R3 1200", gpu: "GTX 750 Ti / 1050", ram: "8GB" },
        // PROMEDIO: Usamos tu gráfica INTEL ARC A380
        mid: { cpu: "i5-12400 / R5 5600", gpu: "RTX 3060 / Intel Arc A380", ram: "16GB" },
        max: { cpu: "i9-13900K / R9 7900X", gpu: "RTX 4080", ram: "32GB" }
    }));

    function calcularFPS(gameName, tier) {
        let base = tier === 'min' ? 40 : tier === 'mid' ? 75 : 144;
        if (gameName.includes("BODYCAM") || gameName.includes("ARENA") || gameName.includes("CYBERPUNK")) base = base * 0.7;
        if (gameName.includes("LEFT 4 DEAD") || gameName.includes("CS2") || gameName.includes("VALORANT")) base = base * 1.6;
        return Math.floor(base);
    }

    function loadList() {
        const container = document.getElementById('game-container');
        container.innerHTML = "";
        gamesData.sort((a,b) => a.name.localeCompare(b.name)).forEach((g, i) => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerText = g.name;
            card.onclick = () => showDetails(i);
            container.appendChild(card);
        });
    }

    function showDetails(i) {
        const g = gamesData[i];
        document.getElementById('det-game-title').innerText = g.name;
        const wrapper = document.getElementById('tier-wrapper');
        
        const tiers = [
            { label: 'CALIDAD BAJA (MÍNIMO)', data: g.min, class: '', type: 'min' },
            { label: 'PROMEDIO (TU CONFIGURACIÓN)', data: g.mid, class: 'promedio', type: 'mid' },
            { label: 'CALIDAD ULTRA (ENTUSIASTA)', data: g.max, class: 'extremo', type: 'max' }
        ];

        wrapper.innerHTML = tiers.map(t => `
            <div class="tier-card ${t.class}">
                <div class="fps-badge">${calcularFPS(g.name, t.type)} FPS ESTIMADOS</div>
                <span style="font-family:'Orbitron'; display:block; font-size:0.7rem; text-align:center; margin-bottom:15px; color:#aaa; text-transform:uppercase;">${t.label}</span>
                
                ${renderRow('CPU', t.data.cpu, 'cpu')}
                ${renderRow('Gráficos (GPU)', t.data.gpu, 'gpu')}
                ${renderRow('Memoria RAM', t.data.ram, 'ram')}
            </div>
        `).join('');

        document.getElementById('list-view').classList.remove('active');
        document.getElementById('detail-view').classList.add('active');
        window.scrollTo(0, 0);
    }

    // FUNCIÓN DE RENDERIZADO CORREGIDA (Usa HTML en lugar de src)
    function renderRow(lab, val, type) {
        return `
            <div class="component-row">
                <div class="comp-visual">${icons[type]}</div>
                <div class="comp-info">
                    <span class="comp-label">${lab}</span>
                    <span class="comp-name">${val}</span>
                </div>
            </div>
        `;
    }

    function filterGames() {
        const val = document.getElementById('search').value.toUpperCase();
        const cards = document.getElementsByClassName('game-card');
        Array.from(cards).forEach(card => card.style.display = card.innerText.includes(val) ? "block" : "none");
    }

    function showList() {
        document.getElementById('detail-view').classList.remove('active');
        document.getElementById('list-view').classList.add('active');
    }

    loadList();
</script>
</body>
</html>
